<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 人生重开模拟器</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/life.css">
</head>
<body>
    #include("../common/header.html")
    <div class="main-container">
        <div class="auth-container">
            <div class="auth-card">
                <h2>登录</h2>
                #if(errMsg)
                <div class="error-msg">#(errMsg)</div>
                #end
                <form action="/user/doLogin" method="post">
                    <div class="form-group">
                        <input type="text" name="username" placeholder="用户名" required>
                    </div>
                    <div class="form-group">
                        <input type="password" name="password" placeholder="密码" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%;">登录</button>
                </form>
                <p class="auth-link">没有账号？<a href="/user/register">立即注册</a></p>
            </div>
        </div>
    </div>
    #include("../common/footer.html")
    <script src="/static/layui/layui.js"></script>
</body>
</html>
