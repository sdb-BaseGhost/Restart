<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>注册 - 人生重开模拟器</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/life.css">
</head>
<body>
    #include("../common/header.html")
    <div class="main-container">
        <div class="auth-container">
            <div class="auth-card">
                <h2>注册</h2>
                #if(errMsg)
                <div class="error-msg">#(errMsg)</div>
                #end
                <form action="/user/doRegister" method="post">
                    <div class="form-group">
                        <input type="text" name="username" placeholder="用户名" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="nickname" placeholder="昵称" required>
                    </div>
                    <div class="form-group">
                        <input type="password" name="password" placeholder="密码" required>
                    </div>
                    <div class="form-group">
                        <input type="password" name="confirmPassword" placeholder="确认密码" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%;">注册</button>
                </form>
                <p class="auth-link">已有账号？<a href="/user/login">去登录</a></p>
            </div>
        </div>
    </div>
    #include("../common/footer.html")
    <script src="/static/layui/layui.js"></script>
</body>
</html>
